title: Project

columns:
  - width: 1/2
    sections:
      project_info:
        label: Content & Media
        type: fields
        fields:
          name:
            label: Game Title
            required: true
            type: text
            maxlength: 50
            width: 5/6
          featured:
            label: Featured
            type: toggle
            text:
              - "No"
              - "Yes"
            default: no
            width: 1/6
            help: Foil card
          flavortext:
            label: Card Flavor Text
            type: text
            maxlength: 80
            width: 1/1
            help: Short text for the portfolio card (max 80 chars).
            placeholder: "Where others see chaos, I see opportunity."
          description:
            label: Description
            required: true
            maxlength: 500
            help: Project description shown in the info panel.
            type: textarea
            size: small
            width: 1/1
          type:
            label: Project Type
            required: true
            type: select
            options:
              - Personal
              - Professional
              - Game Jam
            width: 1/2
          year:
            label: Release Year
            required: true
            min: 2023
            type: number
            width: 1/2
          embedlink:
            label: Embed Link
            type: link
            width: 1/2
            help: YouTube privacy-enhanced mode link.
          embedTitle:
            label: Video Title
            type: text
            maxlength: 50
            width: 1/2

  - width: 1/2
    sections:
      project_details:
        label: Details & Metadata
        type: fields
        fields:
          genre:
            label: Genre
            required: true
            min: 1
            icon: heart-filled
            type: tags
            options:
              - RPG
              - FPS
              - Action
              - Strategy
              - Turn-Based
              - Arcade
              - Puzzle
              - Narrative
            width: 1/2
          platform:
            label: Platforms
            required: true
            type: tags
            icon: blank
            options:
              - PC Windows
              - Playstation 4
              - Playstation 5
              - Xbox One
              - Xbox Series S/X
              - Nintendo Switch
              - Android
              - iOS
              - Web
            width: 1/2
          focus:
            label: Focus Areas
            required: true
            icon: badge
            type: tags
            options:
              - Level Design
              - System Design
              - Game Design
              - Narrative Design
              - UI/UX Design
              - Technical Design
              - Game Art
              - Sound Design
              - Animation
              - Gameplay Programming
              - Tools Programming
              - 3D Modeling
              - 2D Art
            width: 1/2
          duration:
            label: Duration
            required: true
            type: text
            icon: clock
            width: 1/2
          team:
            label: Team Size
            type: text
            icon: users
            width: 1/4
          projectstatus:
            label: Status
            type: select
            default: released
            width: 1/4
            options:
              released: Released
              prototype: Prototype
              in-development: In Development
              early-access: Early Access
              cancelled: Cancelled
          role:
            label: Role
            type: text
            width: 2/4
            placeholder: "Game Designer"
          engine:
            label: Engine
            type: tags
            required: true
            min: 1
            max: 1
            empty: No engine selected yet.
            width: 1/2
            options:
              - Unreal Engine 5
              - Unreal Engine 4
              - Unity
              - Godot
          engineicon:
            label: Engine Icon
            type: select
            options:
              godot-engine.svg: Godot Engine
              svg-sprite.svg: SVG Sprite
              unity.svg: Unity
              unreal-engine.svg: Unreal Engine
            required: true
            width: 1/2
          has_award:
            label: Award
            type: toggle
            text:
              - "No"
              - "Yes"
            default: no
            width: 1/4
          award_description:
            label: Award Description
            type: text
            maxlength: 100
            width: 3/4
            when:
              has_award: true
          externallinks:
            label: External Links
            type: structure
            width: 1/1
            help: Platform icon buttons shown in the info panel.
            fields:
              platform:
                type: select
                label: Platform
                width: 1/3
                options:
                  steam: Steam
                  itch: itch.io
                  youtube: YouTube
                  igdb: IGDB
                  github: GitHub
                  gamejolt: Game Jolt
                  website: Website
              url:
                type: url
                label: URL
                width: 2/3

  - width: 1/4
    sections:
      gallery:
        label: Cover Image
        type: files
        layout: cards
        empty: No image added yet.
        template: gallery-image
        help: Maximum 1 image. Click on image to choose focus.
        limit: 1
        min: 1
        max: 1
        image:
          ratio: 1/1
          cover: true

  - width: 3/4
    sections:
      showcase:
        label: Showcase Images
        type: files
        layout: table
        empty: No images added yet.
        columns:
          alt:
            label: Alternative Text
          focus: true
        template: showcase-image
        limit: 10
        help: Maximum of 10 images.
        image:
          ratio: 1/1
          cover: true