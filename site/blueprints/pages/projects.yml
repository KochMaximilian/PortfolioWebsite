title: Portfolio

tabs:

  # ─── Projects Tab ───
  projects:
    label: Projects
    icon: grid
    columns:
      - width: 1/1
        sections:
          published:
            headline: Listed Public Projects
            type: pages
            layout: cards
            template: project
            text: "{{ page.title }}"
            info: "{{ page.type }} | {{ page.year }}"
            status: listed
            min: 1
            limit: 20
            help: Visible on the page.
            image:
              ratio: 16/9
              cover: true
      - width: 1/2
        sections:
          drafts:
            headline: Drafts
            type: pages
            layout: list
            template: project
            text: "{{ page.title }}"
            info: "{{ page.type }} | {{ page.year }} |"
            status: draft
            help: Make sure you have a cover image!
            image:
              ratio: 16/9
              cover: true
      - width: 1/2
        sections:
          unlisted:
            headline: Unlisted Projects
            type: pages
            layout: lists
            template: project
            text: "{{ page.title }}"
            info: "{{ page.type }} | {{ page.year }}"
            status: unlisted
            help: Not visible on the page but can be shared.
            image:
              ratio: 16/9
              cover: true

  # ─── SEO Tab ───
  seo:
    label: SEO
    icon: search
    columns:
      - width: 1/2
        sections:
          seo_fields:
            label: Search Engine Optimization
            type: fields
            fields:
              seo_description:
                label: Meta Description
                type: textarea
                size: small
                maxlength: 160
                width: 1/1
                help: Custom meta description for the Projects listing page. Falls back to the site description if empty. Max 160 characters.
                placeholder: "Browse the game design portfolio of..."
              seo_keywords:
                label: Keywords
                type: tags
                width: 1/1
                help: Page-specific keywords. Combined with site-wide keywords in the meta tag.
          og_image:
            label: Social Sharing Thumbnail
            type: files
            layout: cards
            max: 1
            uploads:
              template: og-image
            image:
              ratio: 1200/630
              cover: true
            help: "Upload a 1200×630px image. Shown when this page is shared on social media. Falls back to the first project's cover if empty."
      - width: 1/2
        sections:
          seo_info:
            label: SEO Preview
            type: info
            text: |
              **Auto-generated from your content:**
              - **Title tag:** Projects | Site Title
              - **OG image:** Custom thumbnail → first project's cover
              - **Canonical URL:** Auto-set to this page's URL

              Only fill in the fields on the left if you want to override the defaults.

